name: CI

# Runs on every PR into main and on pushes to main.
# The `ci-success` job is the single required status check that branch
# protection gates merges on — it passes only if the full test matrix
# (macOS + Windows + Linux) AND lint are green.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.os }}, py${{ matrix.python-version }})
    strategy:
      fail-fast: false
      matrix:
        # macos-14 matches the release workflow's wheel-build runner.
        os: [ubuntu-latest, windows-latest, macos-14]
        # Oldest supported (3.9), current stable (3.13), and newest (3.14).
        python-version: ['3.9', '3.13', '3.14']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Upgrade pip tooling
        run: python -m pip install --upgrade pip

      # CPU-only torch (test_loader needs it). torch wheels can lag the newest
      # Python for a few weeks — tolerate a miss on 3.14 only; the loader tests
      # then skip (pytest.importorskip) while the native build + core tests
      # still run and gate.
      - name: Install PyTorch (CPU)
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu
        continue-on-error: ${{ matrix.python-version == '3.14' }}

      # Builds the pybind11 native extension from source via scikit-build-core.
      # This is the real cross-OS compatibility test: it must compile with
      # MSVC (Windows), clang (macOS), and gcc (Linux).
      - name: Build & install cfm64 (native extension)
        run: pip install ".[dev]"

      # Fails loudly if the compiled extension is misplaced in the wheel or does
      # not import on this OS. Note: `import cfm64` does NOT require torch.
      - name: Smoke test — native extension imports
        run: python -c "import cfm64; from cfm64 import CFM64Shuffle, FeistelPermutation; print('cfm64', cfm64.__version__, 'OK on', __import__('platform').platform())"

      - name: Run test suite
        run: pytest

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: '3.13'
      - run: pip install ruff
      - run: ruff check src tests

  # Single required check for branch protection. Green only if EVERY matrix
  # job (all 3 OSes × 3 Pythons) and lint succeeded.
  ci-success:
    name: ci-success
    if: always()
    needs: [test, lint]
    runs-on: ubuntu-latest
    steps:
      - name: Gate on test + lint results
        run: |
          echo "test result: ${{ needs.test.result }}"
          echo "lint result: ${{ needs.lint.result }}"
          if [ "${{ needs.test.result }}" != "success" ] || [ "${{ needs.lint.result }}" != "success" ]; then
            echo "::error::CI failed (tests and/or lint) — blocking merge to main."
            exit 1
          fi
          echo "All test and lint jobs passed."
